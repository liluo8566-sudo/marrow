# Marrow config. Live copy: ~/.config/marrow/config.toml
# Swap the conversation/pipeline provider by editing one chain entry below.

[paths]
# Empty = use defaults under ~/.config/marrow/
db = ""
backup_dir = ""
# iCloud offsite copy of the daily DB snapshot. Empty =
# ~/Library/Mobile Documents/com~apple~CloudDocs/Backup/marrow
offsite_backup_dir = ""
# Dashboard renders here (Obsidian vault). Empty = ~/Desktop/NY/dashboard.md
dashboard = ""
# DB-rendered pages folder (milestone.md, diary.md, ...).
# Empty = ~/Desktop/NY/db-pages. Name signals "rendered from DB" — distinct
# from hand-written notes elsewhere in the vault. Legacy key: `sub_pages`.
db_pages = ""
# State dir for db-page hashes. Empty = <DATA_DIR>/state.
db_pages_state = ""

[backup]
# Daily DB snapshots to retain each side (local + offsite). Conservative
# flat count; calendar/GFS rotation is DESIGN-Pending.
keep = 14

[llm]
# Selection chain. Callers pass intent only.
# claude_cli isolation (--setting-sources "" --strict-mcp-config) is built in,
# not configurable: pipeline output must never inherit persona/MCP/output-style.
# Channel note: claude -p uses machine OAuth login (subscription today, credit
# pool from 6/15). cyberboss no-`-p` stream-json subscription = Phase 4 Pending.
default = "claude_cli"
emergency = ""

[llm.claude_cli]
kind = "claude_cli"
# stream = no-`-p` stream-json, rides the OAuth 5h subscription window
# (not the 6/15 credit pool). "p" = legacy headless fallback (-p).
mode = "stream"
timeout_s = 240

[tiers]
# Intent -> model. Callers pass a tier, never a model id.
cheap = "claude-haiku-4-5-20251001"
mid = "claude-sonnet-4-6"
top = "claude-opus-4-7"

[embedding]
# Phase 2: bge-m3 1024d in-process (DECISIONS, Lumi-locked). `model` tags
# which HuggingFace repo to source; `id` tags vector provenance so a future
# swap re-embeds without a base-schema rewrite.
model = "BAAI/bge-m3"
id = "bge-m3"
dim = 1024

[recall]
# FTS5 always on. Vector path active when embedding model files are present.
vector = true
# Fusion weights (DECISIONS B3). Tunable post-audit.
w_vec = 0.55
w_bm25 = 0.30
w_recency = 0.15
w_affect = 0.10
# Cross-table vec lanes (2026-05-25). Anchor tables (memes/entities/
# milestones) get +0.03 over event vec (2026-06-02) — small lift so a
# clean entity card / lore hit ranks above similarly-scored event chatter.
w_memes_vec = 0.58
w_entities_vec = 0.58
w_milestones_vec = 0.58
w_diary_vec = 0.55
w_tasks_vec = 0.55
min_score = 0.35
# Passive-recall hard limit (2026-06-02: 15 → 10 → 6 → 5). dedup'd anchor tables
# skip slots without backfill, so 5 is the upper bound, not the floor.
limit = 5
# Final injected-block char cap (hook backstop). Tables ship full content;
# event main+context combined capped at event_max_chars per hit (hook side).
budget_chars = 600
# Per-event content budget at hook side: main snippet + ↑prev + ↓next combined.
event_max_chars = 120
# Event hits ship with N adjacent same-session turns (prev_N + next_N) so a
# stale answer carries its correction. 0 = disabled.
event_context_window = 1

[sessionend]
# Sessions with ≤ this many user turns skip async LLM extraction (§2.7).
# Threshold tunes after 1-week sample.
skip_turn_threshold = 3

[memes_dedup]
# Cosine similarity threshold for the bge-m3 dedup check against existing
# milestones.title / entities_live.name / active memes.key. Hits ≥ this score
# are treated as concept duplicates and rejected (logged with reason
# 'cosine_dup'). bge-m3 on CN paraphrases (合同 vs 契约) usually scores
# 0.85–0.92; unrelated CN/EN noise stays under 0.50.
cosine_threshold = 0.85
# Persistent-reject backoff: a (key, type) whose SUM(count) in memes_reject_log
# crosses this threshold across persistent reasons (dup_milestone / dup_entity /
# cosine_dup) is fast-skipped — no further gate work, no sonnet token waste on
# repeat candidates.
fast_skip_count = 3

[tasks_dedup]
# Cosine vs active tasks + 24h-window done tasks. Archived intentionally
# excluded — old archived tasks may legitimately resurface under new
# wording. Cross-category in both insert paths.
cosine_threshold = 0.85

[milestones_dedup]
# Cosine vs all milestones.title (table stays small, <1 row/month).
cosine_threshold = 0.85

[entities_dedup]
# Cosine vs same-kind active entities.name. Hit merges new name into
# matched row's aliases JSON (auto-learn), does not block insert path.
cosine_threshold = 0.85

[subpages]
# Sub-page render order + visibility (DESIGN L43-65). Known keys:
#   profile · milestone · diary · memes · stickers · wallet · goose
#   study · projects · cheatsheet
# `top` = content (numbered on dashboard). `bottom` = utility (unnumbered).
# `hidden` = built but not listed in dashboard `## Content`.
top = ["profile", "milestone", "diary", "memes", "stickers", "wallet", "goose"]
bottom = ["study", "projects", "cheatsheet"]
hidden = []

[transcript]
# Single source of truth for the headless-spawn signal. A jsonl whose
# assistant models are all (prefix-match) in this set is a spawned
# `claude` worker call (prompt-lint haiku, diary haiku/sonnet), not an
# archivable session. MUST stay synced with the models pinned in
# marrow/llm.py tiers, marrow/diary.py, ~/.claude/hooks/prompt-lint.py
# (guarded by tests/test_worker_models_sync.py).
worker_models = ["claude-haiku-4-5", "claude-sonnet-4-6"]
