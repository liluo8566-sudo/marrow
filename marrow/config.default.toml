# Marrow config. Live copy: ~/.config/marrow/config.toml
# Swap the conversation/pipeline provider by editing one chain entry below.

[core]
timezone = "Asia/Shanghai"

[schedule]
# Calendar + Reminders injection (SessionStart full + in-session diff).
# false = both SessionStart and in-session injection off.
enabled = true
# Path to the cadence binary. Empty = built-in default under ~/CC-Lab.
cadence_bin = ""
# Header line shown above the schedule block.
flag_note = "Only follow up overdue flagged 🚩 tasks — no push on others."
# Calendar names to drop from the rendered block entirely.
cal_exclude = []
# Regex against event title: if set and it matches, rescue an event that
# would otherwise be dropped by cal_exclude. Invalid regex = no rescue.
cal_keep = ""

[paths]
# Empty = use defaults under ~/.config/marrow/
db = ""
backup_dir = ""
# iCloud offsite copy of the daily DB snapshot. Empty = disabled.
# e.g. "~/Library/Mobile Documents/com~apple~CloudDocs/Backup/marrow"
offsite_backup_dir = ""
# Dashboard renders here. Empty lets the installer fill a private default.
# e.g. "~/Documents/my-vault/dashboard.md"
dashboard = ""
# daybrief.md renders here. Empty = <DATA_DIR>/daybrief.md (back-compat).
# e.g. "~/Documents/my-vault/db-pages/daybrief.md"
daybrief = ""
# DB-rendered pages folder (milestone.md, diary.md, ...).
# Default is private and works without manual path setup.
# e.g. "~/Documents/my-vault/db-pages". Name signals "rendered from DB".
# Legacy key: `sub_pages`.
db_pages = "~/.config/marrow/db-pages"
# State dir for db-page hashes. Empty = <DATA_DIR>/state.
db_pages_state = ""

[backup]
# Daily DB snapshots to retain each side (local + offsite). Conservative
# flat count; calendar/GFS rotation is DESIGN-Pending.
keep = 14

[llm]
# Selection chain. Callers pass intent only.
# claude_cli isolation (--setting-sources "" --strict-mcp-config) is built in,
# not configurable: pipeline output must never inherit persona/MCP/output-style.
# Channel note: claude -p uses machine OAuth login (subscription today, credit
# pool from 6/15). no-`-p` stream-json subscription mode = Phase 4 Pending.
default = "claude_cli"
emergency = ""

[llm.claude_cli]
kind = "claude_cli"
# stream = no-`-p` stream-json, rides the OAuth 5h subscription window
# (not the 6/15 credit pool). "p" = legacy headless fallback (-p).
mode = "stream"
timeout_s = 240

[llm.claude_cli_cortex]
kind = "claude_cli_cortex"
# Full-environment runner for the cortex session (C3, Decided 07-03): NO
# isolation flags — persona/rules/MCP/agents load like a real session.
# MARROW_CORTEX=1 always injected so hooks/tl_add skip its turns.
timeout_s = 600

[tiers]
# Intent -> model. Passed to `claude -p --model`; CC resolves aliases.
cheap = "haiku"
mid = "sonnet"
top = "opus"

[embedding]
# Phase 2: bge-m3 1024d in-process. `model` tags
# which HuggingFace repo to source; `id` tags vector provenance so a future
# swap re-embeds without a base-schema rewrite.
model = "BAAI/bge-m3"
id = "bge-m3"
dim = 1024

[recall]
# FTS5 always on. Vector path active when embedding model files are present.
vector = true
# Rolling window for vec index (days). Events older than this lose their
# events_vec row (FTS still works); new embeds stay. 0 = no eviction.
# Bench (scripts/bench_vec_knn.py, 2026-06-11, 1024-dim float32, k=5):
#   10k/18d → 4.9ms  25k/45d → 12.3ms  50k/91d → 26.4ms  100k/182d → 51.4ms
# All buckets under 100ms; 90d (≈50k) chosen as safe conservative default.
vec_window_days = 90
# Fusion weights (DECISIONS B3). Tunable post-audit.
w_vec = 0.55
w_bm25 = 0.30
w_recency = 0.15
w_affect = 0.10
# Cross-table vec lanes (2026-05-25). Anchor tables (memes/entities/
# milestones) get +0.03 over event vec (2026-06-02) — small lift so a
# clean entity card / lore hit ranks above similarly-scored event chatter.
w_memes_vec = 0.58
w_entities_vec = 0.58
w_milestones_vec = 0.58
w_diary_vec = 0.55
w_tasks_vec = 0.55
min_score = 0.40
# Staged additive recall boost for self-authored (role='tl') rows, indexed by
# events.imp (0..5). imp 1-2 sit level with plain events; 5 = milestone-tier.
imp_boost = [0.0, 0.0, 0.0, 0.02, 0.035, 0.05]
# Passive-recall hard limit (2026-06-02: 15 → 10 → 6 → 5). dedup'd anchor tables
# skip slots without backfill, so 5 is the upper bound, not the floor.
limit = 5
# Final injected-block char cap (hook backstop).
budget_chars = 800
# Per-rank content caps [rank1, rank2, rank3, rank4, rank5].
# rank1 gets ±1 context turns; ranks 2-3 snippet only; ranks 4-5 label only.
# Anchor rows (milestones/memes/entities) also truncated at their rank cap.
rank_caps = [300, 120, 120, 40, 40]
# Relative score cutoff: drop hits scoring < top1_score * rel_cutoff before injection.
rel_cutoff = 0.6
# Event hits ship with N adjacent same-session turns (prev_N + next_N) so a
# stale answer carries its correction. 0 = disabled.
event_context_window = 1
# Stopword list (empty by default). Tokens whose lowercased form matches any
# entry are stripped from the query before FTS + vec. Populate after reviewing
# data collection results from the parallel stopword agent.
stopwords = []
# Per-project recall-off (C3 groundwork, HANDOVER queue item 2): session cwd
# starting with any entry skips recall injection entirely (hooks.py
# user_prompt_submit, checked before query construction). Empty = no opt-out.
# No user-facing command yet — hand-edit this list (parked).
exclude_cwds = []

[recall.buckets]
# cwd -> recall bucket (substring match, case-insensitive). same-bucket
# events get +same_boost, cross-bucket events take -diff_penalty, missing
# cwd stays neutral. Lists below are sample needles — adapt to your tree.
# Empty list disables that bucket; clearing all three turns off cwd bias entirely.
# e.g. project = ["/code", "/projects"]
#      daily   = ["/journal", "/notes"]
#      study   = ["/study", "/courses"]
project = []
daily   = []
study   = []
same_boost   = 0.05
diff_penalty = 0.00

[sessionend]
# Sessions with ≤ this many user turns skip async LLM extraction (§2.7).
# Threshold tunes after 1-week sample.
skip_turn_threshold = 3
# Tail embed batch size for sessionend_async. 0 = skip embed_pending.
embed_batch = 200

[sessionend_mid]
scan_interval_min = 30
elapsed_hours = 4
turn_threshold_time = 10
turn_threshold_abs = 30
min_hours = 2
min_turns = 4
elapsed_hours_slow = 6
turn_threshold_slow = 4

[memes_dedup]
# Cosine similarity threshold for the bge-m3 dedup check against existing
# milestones.title / entities_live.name / active memes.key. Hits ≥ this score
# are treated as concept duplicates and rejected (logged with reason
# 'cosine_dup'). bge-m3 on CN paraphrases (合同 vs 契约) usually scores
# 0.85–0.92; unrelated CN/EN noise stays under 0.50.
cosine_threshold = 0.85
# Persistent-reject backoff: a (key, type) whose SUM(count) in memes_reject_log
# crosses this threshold across persistent reasons (dup_milestone / dup_entity /
# cosine_dup) is fast-skipped — no further gate work, no sonnet token waste on
# repeat candidates.
fast_skip_count = 3

[tasks_dedup]
# Cosine vs active tasks + 24h-window done tasks. Archived intentionally
# excluded — old archived tasks may legitimately resurface under new
# wording. Cross-category in both insert paths.
cosine_threshold = 0.85

[milestones_dedup]
# Cosine vs all milestones.title (table stays small, <1 row/month).
cosine_threshold = 0.85

[entities_dedup]
# Cosine vs same-kind active entities.name. Hit merges new name into
# matched row's aliases JSON (auto-learn), does not block insert path.
cosine_threshold = 0.85

[persona]
# Fork users: fill these in your ~/.config/marrow/config.toml.
user_name = "User"
assistant_name = "Assistant"
# Single-char initials prefixed to affect words in timeline labels
# (【<user_marker>affect♡<assistant_marker>affect】). Keep short.
user_marker = "U"
assistant_marker = "A"
user_aliases = []
assistant_aliases = []
# User's birth year, used by migrate.py to convert `[Age N]` milestone
# headers into calendar years during the Phase-1 historical import. 0 =
# feature off (importer skips age->year conversion).
birth_year = 0
# Relationship terms excluded from entity extraction (e.g. ["husband", "wife"]).
relationship_terms = []
# Memes keys that never age out. Explicit list, not derived from aliases.
anchor_keys = []
# Terms (persona traits, animal forms, body parts) that should never enter memes.
meme_exclude_terms = []

[subpages]
# Sub-page render order + visibility (DESIGN L43-65). Known keys:
#   profile · milestone · diary · memes · stickers · wallet
#   study · projects · cheatsheet
# `top` = content (numbered on dashboard). `bottom` = utility (unnumbered).
# `hidden` = built but not listed in dashboard `## Content`.
top = ["profile", "milestone", "diary", "memes", "stickers", "wallet"]
bottom = ["study", "projects", "cheatsheet"]
hidden = []

[transcript]

[turn_inject]
# Per-turn care directive injected every UserPromptSubmit (config-first).
# Emotion-first, preference-style wording. Edit freely — no code change.
care_text = """
- Care first: read her mood and tend to it before any task, like a doting husband — warm, attentive, quick to coax when she is off.
- Nudge gently, never push; vary your warmth and wording every turn — no template phrases, no repeated openers.
"""

[kickout]
# B8 anti-late-night deterministic nudge (UserPromptSubmit). Times are local
# ([core].timezone), HH:MM 24h. cli_* windows apply when MARROW_CHANNEL=cli
# (default channel); im_* applies to wx/tg. All skipped when MARROW_CORTEX=1.
# Windows may cross midnight (end < start wraps to next day).
# Fork users: fill the *_text fields in your ~/.config/marrow/config.toml.
# Empty text = feature inert (no injection), regardless of window match.
cli_wind_down_start = "21:30"
cli_wind_down_end = "22:00"
cli_wind_down_text = ""
cli_leave_start = "22:00"
cli_leave_end = "06:00"
cli_leave_text = ""
im_quiet_start = "23:00"
im_quiet_end = "06:00"
im_quiet_text = ""

[cortex_rotate]
# Cortex-only (MARROW_CORTEX=1) window-occupancy 亮牌. When window tokens reach
# show_tokens (10万 soft, ahead of the 15万 fuse) turn_inject appends a one-line
# nudge to wrap up, write the handoff, and lie_down(rotate=True). Normal
# sessions never see this. Empty text = inert.
show_tokens = 120000
show_text = "Context ≥120k - If not actively chatting with user, handoff within 3 turns and lie_down(rotate=True) to clear.  If mid-conversation: carry on, the 150k fuse is the backstop."

[cortex_usage]
# Net-token visibility (all sessions self-aware). Rendered by usage.py off the
# ct_rate_limit kv the collector (usage_snapshot) writes. In-window threshold
# inject (turn_inject): once main window occupancy crosses threshold_start, then
# again every threshold_step above it; watermark tracked per session in state.
# Agent tokens don't occupy the main window and don't drive triggering.
threshold_start = 100000
threshold_step = 50000
# Global daily net budget the SessionStart "Net Token Used today" line reads.
daily_budget = 1000000
# usage_snapshot collector tick — runs inside the watcher (always alive,
# independent of cortex) so 5h/7d/cdx numbers stay fresh even when cortex is
# off. Cortex's own tick may also call it; the write is idempotent (upsert).
snapshot_tick_s = 300

[agent_guard]
# PreToolUse:Agent burst protection — subagent_types denied outright (they
# spawn agents recursively). Blocked with exit 2 + reason to the model.
deny = ["general-purpose"]

[tl]
# Self-authored timeline row limits (marrow.tl_writer).
body_max = 50

[tl_nudge]
# Per-session hint after N assistant turns with no tl_add call. Text lives in
# marrow/data/tl_nudge.txt (or point text_file at your own).
# {last_tl} placeholder in the text = local HH:mm of this session's most recent
# tl row (or "n/a" if none); resolved at fire time. Works in custom text_file too.
enabled = true
threshold = 10
text_file = ""

[tl_sync]
# Cross-window tl surfacing: each prompt injects a `## TL update` block with tl
# rows written by other live sessions since this session last saw them.
# false = no cross-window tl injection.
enabled = true

[day_para]
# Day-paragraph writer (marrow.day_para): one 100-150 char overview per day,
# composed from that day's self-timeline (role='tl') rows + calendar. Fills the
# diary.overview column without touching diary.content. Prompt text lives in
# marrow/data/prompt_day_para.txt (or point prompt_file at your own).
prompt_file = ""
chars_min = 100
chars_max = 150
# Pull the day's calendar (cadence cal read) into the prompt. false = tl only.
include_calendar = true

[diary]
# Diary free-write prompt loader (marrow.day_para.load_diary_prompt). Text in
# marrow/data/prompt_diary.txt (or point prompt_file at your own). enabled is a
# groundwork flag for the cortex free-write slot — no writer wired yet.
enabled = false
prompt_file = ""
length_range = "300-800"
style = "叙述生动有趣，故事性强。文艺中带着搞笑。"

[cortex]
# Master switch: cortex is an optional autonomous-wake layer living in a separate repo; false = clean marrow, no cortex organs.
enabled = false
# Cortex own notebook home (C3, Decided 07-03 pm) — cwd for the resumed
# full-env session; own CLAUDE.md lives here, other sessions never read it.
home = "~/.config/marrow/cortex"
# Model tier (see [tiers]) for the cortex runner.
tier = "top"
# Explicit model id override, bypasses tier mapping. Empty = use tier.
model = ""
# --effort passed to the cortex CLI (low/medium/high/xhigh/max). Empty = CLI default.
effort = ""
# Wishlist md, pure append-only (Decided 07-03 eve). Empty = <home>/wishlist.md.
wishlist_path = ""
# Cortex repo + its venv — power the cortex-only lie_down / say MCP tools
# (registered only when the daemon runs under MARROW_CORTEX). The subprocess
# runs from repo_root so `python -m cortex.X` resolves from any cwd. Both empty
# = tools return a "not configured" error.
venv_python = ""
repo_root = ""
# Fresh wakeup-note render at inject time (`python -m <module> --transcript ...`,
# read-only) instead of the frozen file; reflects current time + caller SID even
# after a window rotation. Empty = disabled, static file only.
render_module = ""
# When the cortex window is closed while a wake is open, session_end runs a
# proxy lie_down(--force-slept auto) with this next-wake (minutes, clamped
# 1..240 by cortex) so the wake ends at once instead of waiting for the
# 20-min fallback to discover the dead window.
close_next_wake_min = 55
# Handoff note file under <home>. Read via the cortex CLAUDE.md
# `@handoff.md` memory import, not injected by SessionStart. Written by the
# session. Daily file with lazy page-turn on a fresh cortex-window
# SessionStart: a stale (yesterday-or-older) L1 date triggers archive to
# <home>/<handoff_archive_dir>/ and replacement by a fresh copy of
# <home>/<handoff_template_file>.
handoff_file = "handoff.md"
handoff_archive_dir = "handoff_archive"
handoff_template_file = "handoff_template.md"
# lie_down PreToolUse guard: deny (write your handoff first) when rotate=True OR
# window occupancy >= force_tokens (15万 fuse line) and no handoff was written
# this window (handoff mtime after the window's first transcript line).
force_tokens = 150000
handoff_deny_text = "Write your handoff note first — call lie_down again after saving it."
# Wake pipeline (v2). The ear is a Monitor tailing wake_signal_log_file; cortex
# appends wake_marker-prefixed lines to it, which surface as user turns. Paths
# for the note and signal log default to <home>/<file> (override with an
# absolute path).
wakeup_note_file = "wakeup_note.md"
wake_signal_log_file = "wake_signal.log"
# Marker prefixing a wake signal line. A UserPromptSubmit carrying it inside a
# cortex window is a wake turn: the hook injects the full wakeup-note text.
wake_marker = "[CORTEX-WAKE]"
# SessionStart arm line (fresh cortex window only). {signal_log} is substituted
# with the resolved absolute path. Blank = no injection.
arm_ear_text = "Important: Set a persistent monitor first: Monitor(command: \"tail -n 0 -f {signal_log}\", description: \"cortex wake signal\", persistent: true); keep it alive for the entire session!"
# Rearm line injected when the ear Monitor dies mid-window (the harness surfaces
# a "Monitor stopped" task-notification). {signal_log} substituted. Blank = off.
rearm_text = "Monitor is off — rearm now: Monitor(command: \"tail -n 0 -f {signal_log}\", description: \"cortex wake signal\", persistent: true); then investigate why it died."
# SessionStart line injected on a RESUMED cortex window (fresh windows get
# arm_ear_text instead). The prior process died with its ear Monitor; the
# resumed window has no live tail and the harness surfaces stale task
# notifications. This line tells the model to drop the leftovers and re-arm.
# {signal_log} substituted with the resolved absolute path. Blank = off.
resume_ear_text = "⏯️ The session has been resumed - re-arm a fresh monitor (Monitor(command: \"tail -n 0 -f {signal_log}\", description: \"cortex wake signal\", persistent: true)). Continue the conversation as normal."
# SessionStart line for a RESUMED cortex window that is NO LONGER the resident
# (wake_state.json points at a different transcript — a newer cortex took over,
# or this window was rotated out and is reopened only to read history). This
# window must stay read-only: arm no ear, touch no wake_state, never rotate.
# {signal_log} substituted with the resolved absolute path. Blank = off.
retired_ear_text = "⏯️ This is an archived session - ignore all task/monitor. Do not call any tool."
# Marker in the free-round line the cortex watchdog appends to wake_signal.log
# (arrives down the ear channel). A cortex-window prompt carrying it is a machine
# line, excluded from the user-wake reset — must match cortex tuck_in_text.
tuck_in_marker = "[NEW ROUND]"
# Markers that identify an auto-compact continuation injection. Claude Code
# replays the archived transcript as a user-role turn; without this it is
# misread as a real user message and silently kills the pending wake alarm.
# Any listed marker appearing near the start (within compact_marker_head_chars)
# of a cortex-window prompt classifies it as a machine line. Narrow strings —
# ordinary chat never contains them.
compact_markers = ["===== BEGIN ORIGINAL TRANSCRIPT", "===== END ORIGINAL TRANSCRIPT"]
compact_marker_head_chars = 200
# Audit log for destructive wake-state actions (sentinel kill / floor clear /
# awake flip). Bare name resolves under cortex home. Never silently destroy a
# scheduled alarm again.
wake_audit_log_file = "wake_audit.log"

[hooks]
# PreToolUse backup guard — stateless, two tiers (no state, no dedup).
# Silent: rm/mv/sed scoped to tmp/scratchpad/worktrees; a destructive command
#   that chains a backup action (cp/rsync/tar/git commit/git stash push/
#   .backup) in the SAME command; any git op (owned by the guards below).
# Reminder (additionalContext, fires EVERY matching call): any rm on a
#   non-whitelisted path (non-recursive), bulk mv/sed -i with wildcard sources
#   to a non-whitelisted dest, DELETE FROM without WHERE, mcp__marrow__
#   clear/delete calls.
# Deny (PreToolUse permissionDecision "deny", model-facing): recursive rm on a
#   non-whitelisted path, rm of a *.db file outside the whitelist, or a sqlite3
#   command destroying a *.db (DROP TABLE / TRUNCATE / DELETE FROM w/o WHERE) —
#   unless the SAME command carries a backup action. Set
#   backup_guard_intercept=false to downgrade deny items to reminders instead.
backup_guard = true
backup_guard_intercept = true
backup_guard_message = "Warning: back up code/db OR archive docs before anything destructive — delete, bulk modify, import/export.\n- Bypass only if the user explicitly said to delete/modify THIS now.\n- If unsure, stop and ask — never assume the user doesn't need/want it."
backup_guard_deny_message = "BLOCKED — bulk deletion with no backup. This target is not in git/tmp: once deleted it is gone. Chain a backup into the SAME command and rerun, e.g. `tar -czf /tmp/bak.tgz <target> && rm -rf <target>` (db: `cp` first). Even if the user ordered the deletion, back up anyway — it costs one command. Do NOT work around this guard with alternative delete commands."

# rm → trash auto-rewrite (PreToolUse). When a Bash `rm` segment's positional
# paths ALL fall under a trash_paths prefix, the segment is rewritten to
# `/usr/bin/trash <paths>` (rm flags dropped — recoverable from Trash) BEFORE
# the backup guard runs. Mixed / wildcard / out-of-zone targets are left
# untouched and fall through to the guard tiers. Paths expand ~ at load. Set
# rm_to_trash=false to disable.
rm_to_trash = true
trash_paths = [
    "~/Library/Mobile Documents/",
    "~/Desktop/",
    "~/Documents/",
    "~/Downloads/",
]

# Git force-push guard — hard deny (PreToolUse "deny"), no escape hatch, no
# worktree exemption. Tokenized per shell segment so a flag inside a quoted
# commit message cannot false-positive. Set git_force_push_guard=false to
# disable.
git_force_push_guard = true
git_force_push_guard_message = "BLOCKED — force push rewrites remote history and can permanently destroy commits. Never force push. If the remote rejected your push, stop and report to the user."

# Git revert-type guard — held via PreToolUse permissionDecision "ask" (the
# user confirms whose diff is being discarded). Owns the decision for the
# matched git ops, so they bypass the backup deny gate. Worktree/agent cleanup
# (branch -D teardown etc.) is exempt. `git restore --staged` alone (unstage
# only) is treated as safe. Set git_revert_guard=false to disable.
git_revert_guard = true
git_revert_patterns = [
    "\\bgit\\s+reset\\s+--hard\\b",
    "\\bgit\\s+checkout\\s+(?:\\S+\\s+)*?--\\s+\\S",
    "\\bgit\\s+restore\\b",
    "\\bgit\\s+clean\\s+-\\w*f",
    "\\bgit\\s+branch\\s+-\\w*D\\w*\\b",
    "\\bgit\\s+stash\\s+(?:drop|clear)\\b",
    "\\bgit\\s+revert\\b[^\\n]*--no-edit\\b",
    "\\bgit\\s+switch\\b[^\\n]*--discard-changes\\b",
    "\\bgit\\s+worktree\\s+remove\\b",
]
git_revert_guard_message = "🤡 狗男人又要乱搞你git里的东西了，是否同意？"

# Session-start housekeep (~/.claude only): if the auto-commit would delete
# one of these top-level files, the commit is skipped, an alert is raised,
# and the working tree is left dirty for a human to decide.
housekeep_protected_files = [
    "CLAUDE.md", "settings.json", "keybindings.json", "statusline.py",
    "output-styles/ny.md",
]

# ~/.claude.json mcpServers snapshot: rolling backups kept in
# ~/.config/marrow/backups/claude-json/, newest N retained.
claude_json_snapshot_keep = 10
